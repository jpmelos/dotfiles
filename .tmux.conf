# Set the right TERM.
set -s default-terminal 'tmux-256color'
set -as terminal-overrides ',xterm*:Tc:sitm=\E[3m'
# Extended keys allow tmux to forward modifier combinations like Ctrl+Shift+V
# to applications running inside it.
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Use vi-style key bindings in copy mode.
setw -g mode-keys vi
# Use vi-style key bindings in the status line, for example at the command
# prompt.
set -g status-keys vi

# Start windows and panes at 1, not 0.
set -g base-index 1
setw -g pane-base-index 1
# Renumber windows when a window is closed.
set -g renumber-windows on

# Display messages for a long time.
set -g display-time 4000
# Redraw the status line every 10 seconds.
set -g status-interval 10

# Big buffer
set -g history-limit 50000

# Enable focus events.
# Required for FocusGained, FocusLost events in nvim.
set -g focus-events on

# Status line
set -g status-bg black
set -g status-fg white
set -g status-left "#[fg=green][ "
set -g status-right "#[fg=green]][ #[default]%Y-%m-%d %H:%M#[fg=green] ]"

# Show current window in bold.
setw -g window-status-current-style bold

# No escape time.
set -g escape-time 0

# Use system clipboard.
set -g set-clipboard on

# Enable mouse support (scrolling, pane selection, resizing).
set -g mouse on

#####################
#                   #
#    Keybindings    #
#                   #
#####################

# Use C-s as the new prefix. Unbind C-b.
set-option -g prefix C-s
bind-key C-s send-prefix
unbind-key C-b

# Reload tmux configuration.
bind-key R source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."

#################
#               #
#    Windows    #
#               #
#################

# Create new windows in the same path as the current window.
bind-key c new-window -c "#{pane_current_path}"

# Navigate through tmux windows easily. Do not cycle past the edges.
bind-key -n C-M-h if-shell -F '#{!=:#{window_index},1}' 'previous-window'
bind-key -n C-M-l if-shell -F '#{!=:#{window_index},#{session_windows}}' 'next-window'

# Window organization.
bind-key r command-prompt -p "Please enter new window name:" "rename-window '%1'"
bind-key -n C-M-y "swap-window -t -; previous-window"
bind-key -n C-M-o "swap-window -t +; next-window"

###############
#             #
#    Panes    #
#             #
###############

# Manage panes like in Vim. Create new panes in the same path as the current
# pane.
unbind-key v
bind-key v split-window -h -c "#{pane_current_path}"
bind-key V split-window -fh -c "#{pane_current_path}" -l 80
unbind-key x
bind-key x split-window -v -c "#{pane_current_path}"
bind-key X split-window -fv -c "#{pane_current_path}" -p 25

is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

# Navigate through Vim windows and tmux panes easily. When not in Vim, try
# tmux pane navigation first. If already at the edge (pane didn't change),
# fall through to WezTerm pane navigation.
pane_navigate="$HOME/devel/dotfiles/.config/tmux/pane-navigate.sh"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "run-shell '$pane_navigate left'"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "run-shell '$pane_navigate down'"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "run-shell '$pane_navigate up'"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "run-shell '$pane_navigate right'"

# Switch panes while in copy mode.
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R

bind-key k kill-pane

###################
#                 #
#    Copy mode    #
#                 #
###################

# Enter copy mode with Enter. Enter is C-m, so we need to unbind it from
# tmux-notify first.
bind-key Enter copy-mode

# Enter selection mode with v in copy mode.
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-no-clear
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-no-clear

##############
#            #
#    Misc    #
#            #
##############

# Tell readline to clear screen in bash. But, in Vim, still send C-n.
bind-key -n C-n if-shell "$is_vim" "send-keys C-n" "send-keys C-l"

bind-key -n C-x detach-client

# Use this to run the same command in various panes.
bind-key * setw synchronize-panes
